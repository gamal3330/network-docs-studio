<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Network Docs Studio application preview</title>
  <desc id="desc">A modern network topology diagram editor with device panels, canvas nodes, and clear infrastructure connections.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
