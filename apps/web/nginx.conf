server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /health {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

  gzip on;
  gzip_types text/plain text/css application/json application/javascript image/svg+xml;
}
